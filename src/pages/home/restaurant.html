<section class="restaurant-page">
  <header class="restaurant-hero">
    <p class="restaurant-kicker">Featured Partners</p>
    <h1>Find Your Favorite Restaurants</h1>
    <p class="restaurant-subtitle">
      Browse top-rated places near you. Fast delivery, trusted kitchens, and
      flavors for every craving.
    </p>
    <div class="restaurant-stats">
      <article class="stat-card">
        <span class="stat-value">120+</span>
        <span class="stat-label">Restaurants</span>
      </article>
      <article class="stat-card">
        <span class="stat-value">4.8</span>
        <span class="stat-label">Average Rating</span>
      </article>
      <article class="stat-card">
        <span class="stat-value">25 min</span>
        <span class="stat-label">Typical Delivery</span>
      </article>
    </div>
  </header>

  <section class="restaurant-collection">
    <div class="restaurant-toolbar">
      <h2>Popular Right Now</h2>
      <div class="restaurant-filters" aria-label="Restaurant filter tags">
        <button type="button" class="filter-chip active">All</button>
        <button type="button" class="filter-chip">Fast Food</button>
        <button type="button" class="filter-chip">Cafe</button>
        <button type="button" class="filter-chip">Pizza</button>
      </div>
    </div>
    <div class="shop-items restaurant-grid"></div>
  </section>
</section>
