<main class="main-content">
  <div class="top-bar">
    <input
      class="search-input"
      type="text"
      placeholder="Search menu, orders and more"
    />
    <div class="admin-wrap">
      <div class="avatar"></div>
      <div>
        <p class="admin-name">Admin</p>
      </div>
    </div>
  </div>

  <div class="status-list">
    <span class="status-pill active">All</span>
    <span class="status-pill">Dine In</span>
    <span class="status-pill">Wait List</span>
    <span class="status-pill">Take Away</span>
    <span class="status-pill">Served</span>
  </div>

  <h3 class="section-title">Foodies Menu</h3>
  <div class="food-grid">
    <div class="food-card">
      <div class="food-image"></div>
      <p class="food-name">Grilled Salmon Steak</p>
      <div class="food-meta">
        <span class="food-price">$15.00</span>
        <button class="add-btn" type="button">+</button>
      </div>
    </div>

    <div class="food-card">
      <div class="food-image"></div>
      <p class="food-name">Tofu Poke Bowl</p>
      <div class="food-meta">
        <span class="food-price">$7.00</span>
        <button class="add-btn" type="button">+</button>
      </div>
    </div>

    <div class="food-card">
      <div class="food-image"></div>
      <p class="food-name">Pasta with Roast Beef</p>
      <div class="food-meta">
        <span class="food-price">$10.00</span>
        <button class="add-btn" type="button">+</button>
      </div>
    </div>
  </div>
</main>
